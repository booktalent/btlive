# BookTalent — Nginx production config
# --------------------------------------------------------------------
# 1. Replace  booktalent.example.com  with your real domain (search & replace).
# 2. SSL certs are expected at /etc/letsencrypt/live/<domain>/ (Certbot default).
# 3. Frontend is served as a static React build; backend runs on 127.0.0.1:8001.
# 4. WebSocket route /api/ws/* is proxied with Upgrade headers.
# --------------------------------------------------------------------

# Rate-limit map — 30 req/s per IP for /api, 5 req/s for /api/auth/login
limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name booktalent.example.com www.booktalent.example.com;

    # Allow certbot renewal challenge
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# HTTPS main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name booktalent.example.com www.booktalent.example.com;

    # ── SSL (Let's Encrypt) ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/booktalent.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/booktalent.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"        always;
    add_header X-Content-Type-Options     "nosniff"           always;
    add_header X-XSS-Protection           "1; mode=block"     always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss text/javascript image/svg+xml;

    # ── Upload / body size (KYC docs, review videos up to 30 MB) ────
    client_max_body_size 40M;
    client_body_buffer_size 128k;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # ─────────────────────────────────────────────────────────────────
    # Backend — WebSocket route (must come BEFORE the /api catch-all)
    # ─────────────────────────────────────────────────────────────────
    location ~ ^/api/ws/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket connections can be idle a long time
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ─────────────────────────────────────────────────────────────────
    # Backend — Auth login (tighter rate limit)
    # ─────────────────────────────────────────────────────────────────
    location = /api/auth/login {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────────────────────────────
    # Backend — REST API
    # ─────────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────────────────────────────
    # Frontend — React static build
    # ─────────────────────────────────────────────────────────────────
    root /opt/booktalent/frontend/build;
    index index.html;

    # Cache immutable static assets aggressively
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every non-file request serves index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }
}
